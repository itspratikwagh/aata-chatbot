function renderEnrollmentFlow() {
  const container = document.getElementById("messages");
  const wrapper = document.createElement("div");
  wrapper.className = "message assistant";

  const flowUrl = config.salesforceFlowUrl;
  const isConfigured = flowUrl && !flowUrl.includes("PASTE_YOUR");

  if (!isConfigured) {
    wrapper.innerHTML = `
      <div class="bot-avatar">✈️</div>
      <div class="sf-flow-wrapper">
        <div class="sf-flow-container" style="border-color:#f59e0b;">

            Please contact us directly to enroll:<br><br>
            <strong>Email:</strong> trainingaata@gmail.com<br>
            <strong>Call:</strong> 323-761-9066<br>
            <strong>Apply online:</strong> <a href="https://www.aatatraining.org/apply" target="_blank">www.aatatraining.org/apply</a>
          </div>
        </div>
      </div>

  wrapper.innerHTML = `
    <div class="bot-avatar">✈️</div>
    <div class="sf-flow-wrapper">
      <div class="sf-flow-container" id="enrollmentFlowContainer">
        <div class="sf-flow-header">📋 Step 1: Enrollment & Apprentice Agreement</div>

        <iframe

          style="display:none;"

function handleFlowCompleted() {
  const flowContainer = document.getElementById("enrollmentFlowContainer");
  flowContainer.innerHTML = `
    <div style="text-align:center;padding:20px;color:#065f46;font-weight:600;font-size:14px;">
      ✅ Enrollment form submitted successfully!<br>
      <span style="font-weight:400;font-size:13px;color:#475569;">Your Contact record and DAS Agreement have been saved to AATA's system.</span>
    </div>
  `;

  conversationHistory.push({
    role: "user",
    content: "[SYSTEM: Student has successfully completed the Salesforce enrollment form (Step 1), which includes their registration info AND the DAS Apprentice Agreement. A Contact record has been created in Salesforce. Please congratulate them and guide them to Step 2 - Foothill College enrollment.]"
  });

  setTimeout(async () => {
    isTyping = true;
    showTyping();
    const reply = await getResponse("[Student completed Step 1 — Salesforce enrollment form submitted]");
    hideTyping();
    renderMessage("assistant", reply);
    isTyping = false;
  }, 1000);
}

// ============================================================
// CLAUDE API CALL
// ============================================================
async function callClaudeAPI(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  if (config.mode === "proxy") {
    const res = await fetch(config.proxyUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversationHistory }),
    });
    if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
    const data = await res.json();
    const reply = data.content?.[0]?.text || data.reply || data.message || JSON.stringify(data);
    conversationHistory.push({ role: "assistant", content: reply });
    return reply;
  }

  if (config.mode === "direct") {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": config.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: conversationHistory,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${res.status}`);
    }
    const data = await res.json();
    const reply = data.content[0].text;
    conversationHistory.push({ role: "assistant", content: reply });
    return reply;
  }

  throw new Error("No API configured");
}

// ============================================================
// MAIN RESPONSE HANDLER
// ============================================================
async function getResponse(userMessage) {
  if (config.mode === "offline") {
    return "Please connect to Claude AI for the full enrollment experience.";
  }
  try {
    return await callClaudeAPI(userMessage);
  } catch (err) {
    console.error("API error:", err);
    return `⚠️ I had trouble connecting to the AI service (${err.message}). Please try again or contact us directly at trainingaata@gmail.com or 323-761-9066.`;
  }
}

// ============================================================
// UI LOGIC
// ============================================================
function renderMessage(role, text) {
  if (role !== "assistant") {
    renderMessageBubble(role, text);
    return;
  }

  let remaining = text;

  if (remaining.includes("[SHOW_ENROLLMENT_FLOW]")) {
    const parts = remaining.split("[SHOW_ENROLLMENT_FLOW]");
    if (parts[0].trim()) renderMessageBubble(role, parts[0].trim());
    renderEnrollmentFlow();
    remaining = parts[1] || "";
  }

  if (remaining.trim()) {
    renderMessageBubble(role, remaining.trim());
  }
}

function renderMessageBubble(role, text) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  let html = "";
  if (role === "assistant") {
    html += '<div class="bot-avatar">✈️</div>';
  }

  let formatted = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^#{1,4}\s+(.+)$/gm, "<strong>$1</strong>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/^\s*[-•]\s+/gm, "• ")
    .replace(/^\s*\d+\.\s+/gm, function(match) { return match.trim() + " "; })
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>')
    .replace(/(www\.[^\s<]+)/g, '<a href="https://$1" target="_blank">$1</a>');

  html += `<div class="bubble">${formatted}</div>`;
  div.innerHTML = html;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  messageCount++;
}

function showTyping() {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.id = "typingIndicator";
  div.className = "message assistant";
  div.innerHTML = '<div class="bot-avatar">✈️</div><div class="bubble"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById("typingIndicator")?.remove();
}

async function sendMessage(overrideText) {
  const input = document.getElementById("userInput");
  const text = overrideText || input.value.trim();
  if (!text || isTyping) return;

  input.value = "";
  updateSend();
  renderMessage("user", text);

  if (messageCount > 2) {
    document.getElementById("quickQuestions").style.display = "none";
  }

  isTyping = true;
  showTyping();

  const reply = await getResponse(text);

  hideTyping();
  renderMessage("assistant", reply);
  isTyping = false;
  input.focus();
}

function sendQuick(btn) {
  sendMessage(btn.textContent);
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function updateSend() {
  const btn = document.getElementById("sendBtn");
  const val = document.getElementById("userInput").value.trim();
  btn.className = val && !isTyping ? "send-btn active" : "send-btn";
}

// ── Init ──
renderMessage("assistant", "Welcome to the **American Aerospace Technical Academy (AATA)** Enrollment Assistant! ✈️\n\nI'm here to help you learn about our NDT training programs and guide you through enrollment.\n\nWhat would you like to know? You can type a question or tap one of the quick options below!");
</script>
